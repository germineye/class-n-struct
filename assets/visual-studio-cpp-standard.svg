<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" role="img" aria-labelledby="t d"><title id="t">Cấu hình C++ Language Standard trong Visual Studio</title><desc id="d">Minh họa cửa sổ Property Pages, mục C/C++ General và lựa chọn ISO C++20 Standard.</desc><rect width="1100" height="650" fill="#1b1b1d"/><rect x="24" y="24" width="1052" height="602" rx="6" fill="#252526" stroke="#646464"/><rect x="24" y="24" width="1052" height="48" fill="#323233"/><text x="48" y="55" fill="#fff" font-family="Segoe UI,system-ui" font-size="20">Project Property Pages</text><rect x="45" y="95" width="280" height="490" fill="#202021" stroke="#4a4a4a"/><text x="70" y="130" fill="#ddd" font-family="Segoe UI,system-ui" font-size="18">Configuration Properties</text><text x="92" y="170" fill="#bbb" font-family="Segoe UI,system-ui" font-size="17">General</text><text x="92" y="205" fill="#bbb" font-family="Segoe UI,system-ui" font-size="17">Debugging</text><text x="92" y="240" fill="#fff" font-family="Segoe UI,system-ui" font-size="17" font-weight="700">C/C++</text><rect x="86" y="255" width="220" height="36" fill="#094771"/><text x="110" y="279" fill="#fff" font-family="Segoe UI,system-ui" font-size="17">Language</text><text x="355" y="120" fill="#fff" font-family="Segoe UI,system-ui" font-size="24" font-weight="700">Language</text><line x1="355" y1="138" x2="1040" y2="138" stroke="#505050"/><text x="365" y="190" fill="#ddd" font-family="Segoe UI,system-ui" font-size="18">C++ Language Standard</text><rect x="650" y="158" width="360" height="48" fill="#333337" stroke="#777"/><text x="670" y="189" fill="#fff" font-family="Segoe UI,system-ui" font-size="17">ISO C++20 Standard (/std:c++20)</text><path d="M980 176 l10 10 l10 -10" fill="none" stroke="#ddd" stroke-width="2"/><text x="365" y="245" fill="#aaa" font-family="Segoe UI,system-ui" font-size="16">Chọn C++17 hoặc mới hơn để dùng structured binding.</text><rect x="805" y="560" width="100" height="36" rx="