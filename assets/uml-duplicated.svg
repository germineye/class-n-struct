<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="t d"><title id="t">Sơ đồ Actor, Goblin và Dragon trước khi tách Character</title><desc id="d">Goblin và Dragon cùng lặp lại Move, Attack và DropLoot.</desc><rect width="920" height="440" fill="#0a1014"/><rect x="310" y="25" width="300" height="125" rx="4" fill="#111b22" stroke="#72e7ff" stroke-width="3"/><text x="460" y="65" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Actor</text><line x1="310" y1="80" x2="610" y2="80" stroke="#72e7ff"/><text x="340" y="120" fill="#bcff67" font-family="monospace" font-size="20">+ Render()</text><path d="M460 150 V190 H235 V225 M460 190 H685 V225" fill="none" stroke="#72e7ff" stroke-width="3"/><rect x="55" y="225" width="360" height="185" rx="4" fill="#111b22" stroke="#ffd86b" stroke-width="3"/><text x="235" y="266" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Goblin</text><line x1="55" y1="282" x2="415" y2="282" stroke="#ffd86b"/><text x="82" y="320" fill="#ffd86b" font-family="monospace" font-size="18">+ Move()</text><text x="82" y="352" fill="#ffd86b" font-family="monospace" font-size="18">+ Attack()</text><text x="230" y="320" fill="#ffd86b" font-family="monospace" font-size="18">+ DropLoot()</text><text x="230" y="352" fill="#bcff67" font-family="monospace" font-size="18">+ Enrage()</text><rect x="505" y="225" width="360" height="185" rx="4" fill="#111b22" stroke="#ffd86b" stroke-width="3"/><text x="685" y="266" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Dragon</text><line x1="505" y1="282" x2="865" y2="282" stroke="#ffd86b"/><text x="532" y="320" fill="#ffd86b" font-family="monospace" font-size="18">+ Move()</text><text x="532" y="352" fill="#ffd86b" font-family="monospace" font-size="18">+ Attack()</text><text x="680" y="320" fill="#ffd86b" font-family="monospace" font-size="18">+ DropLoot()</text><text x="680" y="352" fill="#bcff67" font-family="monospace" font-size="18">+ Fly()</text><text x="460" y="431" text-anchor="middle" fill="#ffd86b" font-family="system-ui" font-size="16">Move(), Attack() và DropLoot() đang bị lặp</text></svg>
