<svg xmlns="http://www.w3.org/2000/svg" width="920" height="650" viewBox="0 0 920 650" role="img" aria-labelledby="t d"><title id="t">Sơ đồ hierarchy Actor, Character, Goblin và Dragon</title><desc id="d">Character kế thừa Actor; Goblin và Dragon kế thừa Character.</desc><rect width="920" height="650" fill="#0a1014"/><rect x="310" y="20" width="300" height="115" rx="4" fill="#111b22" stroke="#72e7ff" stroke-width="3"/><text x="460" y="58" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Actor</text><line x1="310" y1="73" x2="610" y2="73" stroke="#72e7ff"/><text x="340" y="108" fill="#bcff67" font-family="monospace" font-size="20">+ Render()</text><line x1="460" y1="135" x2="460" y2="205" stroke="#72e7ff" stroke-width="3"/><rect x="280" y="205" width="360" height="175" rx="4" fill="#111b22" stroke="#bcff67" stroke-width="3"/><text x="460" y="244" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Character</text><line x1="280" y1="260" x2="640" y2="260" stroke="#bcff67"/><text x="310" y="298" fill="#bcff67" font-family="monospace" font-size="18">+ Move()</text><text x="310" y="330" fill="#bcff67" font-family="monospace" font-size="18">+ Attack()</text><text x="470" y="298" fill="#bcff67" font-family="monospace" font-size="18">+ DropLoot()</text><path d="M460 380 V430 H235 V470 M460 430 H685 V470" fill="none" stroke="#72e7ff" stroke-width="3"/><rect x="75" y="470" width="320" height="140" rx="4" fill="#111b22" stroke="#bcff67" stroke-width="3"/><text x="235" y="510" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Goblin</text><line x1="75" y1="526" x2="395" y2="526" stroke="#bcff67"/><text x="105" y="570" fill="#bcff67" font-family="monospace" font-size="19">+ Enrage()</text><rect x="525" y="470" width="320" height="140" rx="4" fill="#111b22" stroke="#bcff67" stroke-width="3"/><text x="685" y="510" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="25" font-weight="700">Dragon</text><line x1="525" y1="526" x2="845" y2="526" stroke="#bcff67"/><text x="555" y="570" fill="#bcff67" font-family="monospace" font-size="19">+ Fly()</text><text x="460" y="635" text-anchor="middle" fill="#9baab3" font-family="system-ui" font-size="16">Code dùng chung nằm trong Character</text></svg>
