<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="t d"><title id="t">Sơ đồ UML của Actor và Goblin</title><desc id="d">Goblin kế thừa từ Actor.</desc><rect width="760" height="520" fill="#0a1014"/><defs><marker id="a" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto"><path d="M1,11 L6,1 L11,11 Z" fill="#0a1014" stroke="#72e7ff" stroke-width="1.5"/></marker></defs><rect x="230" y="38" width="300" height="150" rx="4" fill="#111b22" stroke="#72e7ff" stroke-width="3"/><rect x="230" y="38" width="300" height="55" fill="#152730"/><text x="380" y="73" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="26" font-weight="700">Actor</text><line x1="230" y1="93" x2="530" y2="93" stroke="#72e7ff"/><text x="255" y="140" fill="#bcff67" font-family="monospace" font-size="21">+ Render()</text><line x1="380" y1="280" x2="380" y2="191" stroke="#72e7ff" stroke-width="3" marker-end="url(#a)"/><rect x="190" y="280" width="380" height="205" rx="4" fill="#111b22" stroke="#bcff67" stroke-width="3"/><rect x="190" y="280" width="380" height="55" fill="#1a2b12"/><text x="380" y="316" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="26" font-weight="700">Goblin</text><line x1="190" y1="335" x2="570" y2="335" stroke="#bcff67"/><text x="218" y="375" fill="#bcff67" font-family="monospace" font-size="19">+ Move()</text><text x="218" y="407" fill="#bcff67" font-family="monospace" font-size="19">+ Attack()</text><text x="395" y="375" fill="#bcff67" font-family="monospace" font-size="19">+ DropLoot()</text><text x="395" y="407" fill="#bcff67" font-family="monospace" font-size="19">+ Enrage()</text><text x="380" y="459" text-anchor="middle" fill="#9baab3" font-family="system-ui" font-size="15">inherit Render() từ Actor</text></svg>
